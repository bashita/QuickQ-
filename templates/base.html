<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QuickQ{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background-image: url('static/images/image3.png');
            background-repeat: no-repeat; 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="{{ url_for('home') }}">QUICKQ</a>
            <nav class="nav-menu">
                <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                <a class="nav-link" href="{{ url_for('createQ') }}">Create Queue</a>
                <a class="nav-link" href="{{ url_for('join_queue') }}">Join Queue</a>
                <a class="nav-link" href="{{ url_for('manage_queue_form') }}">Manage Queue</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        Built for fast, friendly queue management.
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
